codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        base: auto
    patch:
      default:
        target: 80%
        threshold: 5%

ignore:
  - "tests/**"
  - "node_modules/**"
  - "*.config.js"
  - "*.config.ts"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no
